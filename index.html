<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent 通信网络白皮书</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, "PingFang SC", sans-serif; color: #333; height: 100vh; display: flex; font-size: 17px; }

    /* 侧边栏 */
    .sidebar {
      width: 240px;
      min-width: 240px;
      height: 100vh;
      border-right: 1px solid #e5e5e5;
      background: #fafafa;
      padding: 24px 0;
      overflow-y: auto;
      position: sticky;
      top: 0;
    }
    .sidebar h2 {
      font-size: 13px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0 20px;
      margin-bottom: 12px;
    }
    .sidebar a {
      display: block;
      padding: 8px 20px;
      font-size: 14px;
      color: #555;
      text-decoration: none;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }
    .sidebar a:hover { background: #f0f0f0; color: #111; }
    .sidebar a.active {
      color: #111;
      font-weight: 600;
      border-left-color: #333;
      background: #f0f0f0;
    }

    /* 正文 */
    .content {
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      padding: 48px 80px;
    }
    .content h1 { font-size: 32px; margin-bottom: 12px; }
    .content h2 { font-size: 25px; margin-top: 2.8em; margin-bottom: 0.8em; }
    .content h3 { font-size: 21px; margin-top: 2.2em; margin-bottom: 0.5em; }
    .content p { line-height: 2.0; margin-bottom: 1.3em; }
    .content blockquote { border-left: 4px solid #ddd; padding-left: 1.2em; color: #666; margin: 1.5em 0; line-height: 2.0; }
    .content hr { border: none; border-top: 1px solid #e5e5e5; margin: 3em 0; }
    .content code { background: #f5f5f5; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
    .content ul, .content ol { padding-left: 1.5em; margin-bottom: 1.3em; }
    .content li { line-height: 2.0; margin-bottom: 0.5em; }
    .content table { border-collapse: collapse; margin: 1em 0; width: 100%; }
    .content th, .content td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
    .content th { background: #fafafa; font-weight: 600; }
    .content strong { font-weight: 600; }
  </style>
</head>
<body>
  <nav class="sidebar">
    <h2>文档</h2>
    <div id="nav-docs"></div>
    <h2 style="margin-top: 24px;">博客</h2>
    <div id="nav-blogs"></div>
  </nav>
  <main class="content" id="content"></main>

  <script>
    const navDocs = document.getElementById('nav-docs');
    const navBlogs = document.getElementById('nav-blogs');
    const content = document.getElementById('content');

    function load(file) {
      document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
      const link = document.querySelector(`.sidebar a[data-file="${file}"]`);
      if (link) link.classList.add('active');

      fetch(file + '?t=' + Date.now())
        .then(r => r.text())
        .then(text => {
          const mathBlocks = [];
          text = text.replace(/\$\$([^$]+?)\$\$/g, (_, tex) => {
            mathBlocks.push({ tex: tex.trim(), display: true });
            return `%%MATH_${mathBlocks.length - 1}%%`;
          });
          text = text.replace(/\$([^$]+?)\$/g, (_, tex) => {
            mathBlocks.push({ tex: tex.trim(), display: false });
            return `%%MATH_${mathBlocks.length - 1}%%`;
          });
          let html = marked.parse(text);
          html = html.replace(/%%MATH_(\d+)%%/g, (_, i) => {
            const { tex, display } = mathBlocks[i];
            try { return katex.renderToString(tex, { displayMode: display, throwOnError: false }); }
            catch { return tex; }
          });
          content.innerHTML = html;
          content.scrollTop = 0;
        });
    }

    function loadSection(dir, container) {
      return fetch(dir + '/?t=' + Date.now())
        .then(r => r.text())
        .then(html => {
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');
          const files = [...doc.querySelectorAll('a')]
            .map(a => a.getAttribute('href'))
            .filter(href => href.endsWith('.md'));

          // Fetch each file to extract its H1 title for the sidebar
          const promises = files.map(file => {
            const path = dir + '/' + file;
            return fetch(path + '?t=' + Date.now())
              .then(r => r.text())
              .then(text => {
                const match = text.match(/^#\s+(.+)$/m);
                const title = match ? match[1].replace(/\*\*/g, '') : file;
                const a = document.createElement('a');
                a.href = '#';
                a.textContent = title;
                a.dataset.file = path;
                a.addEventListener('click', e => { e.preventDefault(); load(a.dataset.file); });
                container.appendChild(a);
                return path;
              });
          });

          return Promise.all(promises);
        });
    }

    // 加载 docs 和 blogs 两个目录
    Promise.all([
      loadSection('docs', navDocs),
      loadSection('blogs', navBlogs)
    ]).then(([docFiles]) => {
      if (docFiles.length) load(docFiles[0]);
    });
  </script>
</body>
</html>
